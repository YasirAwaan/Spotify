<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
  </head>
  <body>
    <div class="container bg-black flex">
      <div class="left">
        <div class="home bg-grey rounded m-1 p-1">
          <div class="logo">
            <img class="invert" src="Assets/img/logo.svg" alt="" />
          </div>
          <ul>
            <li>
              <img class="invert" src="Assets/img/home.svg" alt="Home" />
              Home
            </li>
            <li>
              <img class="invert" src="Assets/img/search.svg" alt="Search" />
              Search
            </li>
          </ul>
        </div>
        <div class="library bg-grey bg-black rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="Assets/img/playlist.svg" alt="" />
            <h2>Your Library</h2>
          </div>

          <div class="footer">
            <div>
              <a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a>
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/"
                ><span>Privacy Policy</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"
                ><span>About Ads</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/accessibility/"
                ><span>Accessibility</span></a
              >
            </div>
          </div>
        </div>
      </div>
      <div class="right bg-grey rounded">
        <div class="header rounded">
          <div class="nav">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              class="injected-svg"
              data-src="https://cdn.hugeicons.com/icons/arrow-left-01-stroke-rounded.svg?v=1.0.0"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              role="img"
              color="currentColor"
            >
              <path
                d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>

            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              class="injected-svg"
              data-src="https://cdn.hugeicons.com/icons/arrow-right-01-stroke-rounded.svg?v=1.0.0"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              role="img"
              color="currentColor"
            >
              <path
                d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </div>
          <div class="buttons">
            <button>Sign up</button>
            <button>Login in</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
