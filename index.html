<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
    <link
      rel="shortcut icon"
      href="Assets/img/favicon.ico"
      type="image/x-icon"
    />
    <title>Spotify - Web Player: Music for everyone</title>
  </head>

  <body>
    <div class="container flex bg-black">
      <div class="left">
        <div class="close invert">
          <img width="30px" src="Assets/img/close.svg" alt="" />
        </div>
        <div class="home bg-grey rounded m-1 p-1">
          <div class="logo">
            <img width="110" class="invert" src="Assets/img/logo.svg" alt="" />
          </div>
          <ul>
            <li>
              <img class="invert" src="Assets/img/home.svg" alt="Home" />Home
            </li>
            <li>
              <img
                class="invert"
                src="Assets/img/search.svg"
                alt="Search"
              />Search
            </li>
          </ul>
        </div>

        <div class="library bg-grey rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="Assets/img/playlist.svg" alt="" />
            <h2>Your Library</h2>
          </div>

          <div class="songList">
            <ul>
              <li>
                <img class="invert" src="Assets/img/music.svg" alt="" />
                <div class="info">
                  <div>Song Name</div>
                  <div>Song Artist</div>
                </div>
                <img class="invert" src="Assets/img/play.svg" alt="" />
              </li>
            </ul>
          </div>
          <div class="footer">
            <div>
              <a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a>
            </div>
            <div>
              <a href="https://www.spotify.com/jp/privacy/"
                ><span>Privacy Center</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/"
                ><span>Privacy Policy</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/cookies-policy/"
                ><span>Cookies</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"
                ><span>About Ads</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/accessibility/"
                ><span>Accessibility</span></a
              >
            </div>
          </div>
        </div>
      </div>
      <div class="right bg-grey rounded">
        <div class="header rounded">
          <div class="nav">
            <div class="HamburgerContainer">
              <img
                class="invert hamburger"
                src="Assets/img/hamburger.svg"
                alt=""
              />
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                class="injected-svg"
                data-src="https://cdn.hugeicons.com/icons/arrow-left-01-stroke-rounded.svg?v=1.0.0"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                role="img"
                color="currentColor"
              >
                <path
                  d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                class="injected-svg"
                data-src="https://cdn.hugeicons.com/icons/arrow-right-01-stroke-rounded.svg?v=1.0.0"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                role="img"
                color="currentColor"
              >
                <path
                  d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </div>
          </div>
          <div class="buttons">
            <button class="signup-btn">Sign up</button>
            <button class="login-btn">Log in</button>
          </div>
        </div>
        <div class="SpotifyPlaylists">
          <h1>Spotify Playlists</h1>
          <div class="cardContainer">
            <div class="card">
              <div class="play">
                <svg
                  width="45"
                  height="45"
                  viewBox="0 0 50 50"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <circle cx="25" cy="25" r="20" fill="#1ed760" />

                  <g transform="translate(12.5,12.5)">
                    <svg
                      width="25"
                      height="25"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        opacity="0.4"
                        d="M13.9405 6.337C15.5735 7.26468 16.8567 7.99369 17.7709 8.66148C18.6913 9.33386 19.3721 10.0366 19.6159 10.9632C19.7947 11.6426 19.7947 12.3574 19.6159 13.0368C19.3721 13.9634 18.6913 14.6661 17.7709 15.3385C16.8567 16.0063 15.5735 16.7353 13.9406 17.663L13.9406 17.663C12.3632 18.5591 11.033 19.3148 10.0232 19.7444C9.0053 20.1773 8.07729 20.3968 7.17536 20.1412C6.51252 19.9533 5.90941 19.5968 5.42356 19.1066C4.76419 18.4414 4.49951 17.5219 4.37429 16.4154C4.24998 15.3169 4.24999 13.879 4.25 12.0501V11.9499C4.24999 10.121 4.24998 8.68309 4.37429 7.58464C4.49951 6.4781 4.76419 5.55861 5.42356 4.89335C5.90941 4.40317 6.51252 4.04666 7.17536 3.85883C8.07729 3.60325 9.0053 3.82269 10.0232 4.25565C11.033 4.68516 12.3632 5.44084 13.9405 6.337Z"
                        fill="black"
                      />
                      <path
                        d="M17.7713 8.66271C18.6918 9.33509 19.3725 10.0379 19.6164 10.9644C19.7952 11.6439 19.7952 12.3586 19.6164 13.0381C19.3725 13.9646 18.6918 14.6674 17.7713 15.3398C16.8572 16.0075 15.574 16.7365 13.9411 17.6642C12.3637 18.5604 11.0335 19.3161 10.0237 19.7456C9.00576 20.1785 8.07776 20.398 7.17582 20.1424C6.51298 19.9546 5.90987 19.5981 5.42403 19.1079C4.76465 18.4426 4.49997 17.5231 4.37475 16.4166C4.29889 15.7463 4.26933 14.9495 4.25781 14.0146L16.1055 7.58588C16.7533 7.97227 17.3094 8.32531 17.7713 8.66271Z"
                        fill="black"
                      />
                    </svg>
                  </g>
                </svg>
              </div>
              <img
                src="https://i.scdn.co/image/ab67616d00001e02f34daa9485654ad8ad458571"
                alt=""
              />
              <h2>Duji Vaar Pyar</h2>
              <p>Duji var pyar by (sunanda sharma)</p>
            </div>
          </div>
          <div class="playbar">
            <div class="track">
              <img class="cover" src="Assets/img/music.svg" />
              <div class="songinfo"></div>
            </div>

            <div class="seekbar">
              <div class="progress"></div>
              <div class="circle"></div>
            </div>

            <div class="songbutton">
              <img class="invert prev" src="Assets/img/prevsong.svg" />
              <img class="invert play-btn" src="Assets/img/play-btn.svg" />
              <img class="invert next" src="Assets/img/nextsong.svg" />
            </div>

            <div class="volumeControl">
              <div class="volume">
                <img class="invert" src="Assets/img/volume.svg" alt="" />
                <div class="volume-bar">
                  <div class="volume-progress"></div>
                </div>
              </div>
              <div class="songtime"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
